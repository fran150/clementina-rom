# ============================================================================
# clementina.cfg - PROVISIONAL standalone BASIC link for the Clementina target
# ----------------------------------------------------------------------------
# Used by make.sh to compile/link the `clementina` BASIC target on its own as a
# build check. The real Clementina build links BASIC into the combined kernel
# image (src/kernel/clementina.cfg); this file is just a self-contained sanity
# build and its addresses are not the final layout.
# ============================================================================

MEMORY {
	ZP:		start = $0000, size = $0100, type = rw;
	BASROM:		start = $1000, size = $6F00, fill = no, file = %O;
	DUMMY:		start = $0000, size = $00FF, file = "";
}

SEGMENTS {
	ZEROPAGE:	load = ZP,	type = zp;
	HEADER:		load = BASROM,	type = ro;
	VECTORS:	load = BASROM,	type = ro;
	KEYWORDS:	load = BASROM,	type = ro;
	ERROR:		load = BASROM,	type = ro;
	CODE:		load = BASROM,	type = ro;
	CHRGET:		load = BASROM,	type = ro;
	INIT:		load = BASROM,	type = ro;
	EXTRA:		load = BASROM,	type = ro;
	DUMMY:		load = DUMMY; # don't include
}
