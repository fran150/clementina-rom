# ============================================================================
# clementina.cfg - linker config for the combined Clementina image
# ----------------------------------------------------------------------------
# MIA loads the image into base RAM starting at the load base ($0400) and
# points the RESET vector there. The output is a raw binary whose first byte
# corresponds to $0400.
#
# IMPORTANT: booting at $0400 requires kernel_target_address = 0x0400 in both
#   - clementina-mia firmware: src/mia/sys/mia.c
#   - clementina-6502 emulator: pkg/components/mia/registers.go
# (both are now set to 0x0400). See docs/memory-map.md.
#
# Milestone 1 links the kernel only. WozMon and BASIC segments are reserved
# here and will be enabled as those pieces are integrated.
# ============================================================================

MEMORY {
    # Kernel zero page block. BASIC owns the low/mid zero page; the kernel
    # keeps a small block high. Not part of the loaded image.
    ZP:    start = $00F0, size = $0010, type = rw, define = yes;

    # Loaded image lives in base RAM from the load base up. Everything above
    # the image, to $7FFF, is BASIC's free workspace at runtime.
    MAIN:  start = $0400, size = $7C00, type = rw, file = %O, fill = no, define = yes;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp,  optional = yes;
    JUMPTAB:  load = MAIN, type = ro,  start = $0400;
    CODE:     load = MAIN, type = ro;
    RODATA:   load = MAIN, type = ro,  optional = yes;
    # Reserved for later integration:
    # MONITOR:  load = MAIN, type = ro,  optional = yes;
    # BASIC:    load = MAIN, type = ro,  optional = yes;
}
