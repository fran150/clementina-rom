# ============================================================================
# clementina.cfg - linker config for the combined Clementina image
# ----------------------------------------------------------------------------
# MIA loads the image into base RAM starting at the load base ($0400) and
# points the RESET vector there. The output is a raw binary whose first byte
# corresponds to $0400.
#
# IMPORTANT: booting at $0400 requires kernel_target_address = 0x0400 in both
#   - clementina-mia firmware: src/mia/sys/mia.c
#   - clementina-6502 emulator: pkg/components/mia/registers.go
# (both are now set to 0x0400). See docs/memory-map.md.
#
# Links the kernel jump table/console first, then MS BASIC. MIA loads the whole
# image at $0400 and enters the kernel cold start vector.
# ============================================================================

MEMORY {
    # BASIC owns low/mid zero page; the kernel keeps a small high block.
    BASICZP: start = $0000, size = $00F0, type = rw, define = yes;
    KZP:     start = $00F0, size = $0010, type = rw, define = yes;

    # Loaded image lives in base RAM from the load base up. Base RAM above the
    # image is the lower part of BASIC's workspace; Extended RAM bank 0 at
    # $8000-$BFFF supplies its upper part at runtime.
    MAIN:  start = $0400, size = $7C00, type = rw, file = %O, fill = no, define = yes;
    DUMMY: start = $0000, size = $00FF, type = rw, file = "";
}

SEGMENTS {
    ZEROPAGE: load = BASICZP, type = zp,  optional = yes;
    KZEROPAGE: load = KZP,    type = zp,  optional = yes;
    JUMPTAB:   load = MAIN,   type = ro,  start = $0400;
    CODE:      load = MAIN,   type = ro;
    RODATA:    load = MAIN,   type = ro,  optional = yes;
    HEADER:    load = MAIN,   type = ro;
    VECTORS:   load = MAIN,   type = ro;
    KEYWORDS:  load = MAIN,   type = ro;
    ERROR:     load = MAIN,   type = ro;
    CHRGET:    load = MAIN,   type = ro;
    INIT:      load = MAIN,   type = ro;
    EXTRA:     load = MAIN,   type = ro;
    DUMMY:     load = DUMMY,  optional = yes;
}
